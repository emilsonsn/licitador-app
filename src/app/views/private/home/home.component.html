<main class="home-page">
  <section class="home-hero">
    <div class="hero-copy">
      <p class="eyebrow">Gestor Facility</p>
      <h1>Parceira. Confiança. <strong>Resultado.</strong></h1>
      <p>Cada edital é uma nova oportunidade para transformar esforço em sucesso.</p>

      <div class="hero-actions">
        <button type="button" class="primary-action" (click)="navigate('/painel/home/tenders')">
          <i class="fa-solid fa-magnifying-glass"></i>
          Encontrar licitações
        </button>

        <button type="button" class="secondary-action" (click)="startTour('home', true)">
          <i class="fa-solid fa-route"></i>
          Tour
        </button>
      </div>
    </div>

    <img alt="Gestor Facility" src="assets/images/pagina_inicial.png"/>
  </section>

  <section class="section-block quick-access">
    <div class="section-heading">
      <div>
        <p class="eyebrow">Acesso rápido</p>
        <h2>Ferramentas principais</h2>
      </div>
      <i class="fa-solid fa-bolt"></i>
    </div>

    <div class="tool-grid">
      <button
        *ngFor="let tool of mainTools"
        type="button"
        class="tool-card primary-tool"
        (click)="navigate(tool.link)">
        <i class="{{ tool.icon }}"></i>
        <span>{{ tool.title }}</span>
        <small>{{ tool.description }}</small>
      </button>
    </div>
  </section>

  <section class="section-block">
    <div class="section-heading">
      <div>
        <p class="eyebrow">Operação</p>
        <h2>Serviços úteis para sua rotina</h2>
      </div>
      <i class="fa-solid fa-layer-group"></i>
    </div>

    <div class="tool-grid external-grid">
      <button
        *ngFor="let tool of externalTools"
        type="button"
        class="tool-card"
        (click)="navigate(tool.link)">
        <i class="{{ tool.icon }}"></i>
        <span>{{ tool.title }}</span>
        <small>{{ tool.description }}</small>
        <em>Abre em nova aba</em>
      </button>
    </div>
  </section>

  <input type="checkbox" id="toggle-chat" hidden>

  <label for="toggle-chat" id="chat-toggle-button">
    <i class="fa-solid fa-comments"></i>
    IA Jurídica
  </label>

  <iframe
    src="https://chat.localizadordeeditais.com.br/"
    id="chat-ia"
    title="IA - Assistente Jurídico e Licitação"
  ></iframe>
</main>
