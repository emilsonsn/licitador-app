<main class="home-page">
  <section class="home-hero">
    <a
      href="http://wa.me/558599006587"
      target="_blank"
      rel="noopener noreferrer"
      aria-label="Falar com a Gestor Facility pelo WhatsApp">
      <img alt="Gestor Facility" src="assets/images/banner.jpeg"/>
    </a>
  </section>

  <section class="section-block quick-access">
    <div class="section-heading">
      <div>
        <p class="eyebrow">Acesso rápido</p>
        <h2>Ferramentas principais</h2>
      </div>
      <i class="fa-solid fa-bolt"></i>
    </div>

    <div class="tool-grid">
      <button
        *ngFor="let tool of mainTools"
        type="button"
        class="tool-card primary-tool"
        (click)="navigate(tool.link)">
        <i class="{{ tool.icon }}"></i>
        <span>{{ tool.title }}</span>
        <small>{{ tool.description }}</small>
      </button>
    </div>
  </section>

  <section class="section-block">
    <div class="section-heading">
      <div>
        <p class="eyebrow">Operação</p>
        <h2>Serviços úteis para sua rotina</h2>
      </div>
      <i class="fa-solid fa-layer-group"></i>
    </div>

    <div class="tool-grid external-grid">
      <button
        *ngFor="let tool of externalTools"
        type="button"
        class="tool-card"
        (click)="navigate(tool.link)">
        <i class="{{ tool.icon }}"></i>
        <span>{{ tool.title }}</span>
        <small>{{ tool.description }}</small>
        <em>Abre em nova aba</em>
      </button>
    </div>
  </section>

  <iframe

</main>
